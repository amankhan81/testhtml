<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjectives & Adverbs Practice</title>
    <style>
        :root {
            --primary: #00A8E8;
            --secondary: #007EA7;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8fafc;
            --text: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-size: 20pt;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 95vw;
            height: 90vh;
            max-width: 1000px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 40px;
            box-sizing: border-box;
        }

        header {
            border-bottom: 4px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-size: 1.2em;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            margin-bottom: 30px;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        #quiz-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: var(--white);
            border: 3px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            font-size: 20pt;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f0f9ff;
        }

        .option-btn.correct {
            border-color: var(--success);
            background-color: #dcfce7;
            color: #166534;
        }

        .option-btn.wrong {
            border-color: var(--danger);
            background-color: #fee2e2;
            color: #991b1b;
        }

        .option-btn.disabled {
            cursor: default;
        }

        #feedback-area {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .feedback-correct { background-color: #dcfce7; border-left: 8px solid var(--success); }
        .feedback-wrong { background-color: #fee2e2; border-left: 8px solid var(--danger); }

        #next-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20pt;
            cursor: pointer;
            display: none;
            align-self: flex-end;
        }

        #results-screen {
            display: none;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
        }

        .score-num { font-size: 60pt; font-weight: 800; color: var(--primary); }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20pt;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            align-self: center;
        }

        .icon { font-weight: bold; font-size: 1.2em; }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            #app-container { height: 95vh; padding: 20px; }
            body { font-size: 16pt; }
            .option-btn, #next-btn, .restart-btn { font-size: 16pt; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="title">Adverb & Adjective Usage</div>
            <div id="q-count">1 / 15</div>
        </header>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="quiz-area">
            <div id="question-container">
                <div class="question-text" id="question-text">Loading...</div>
                <div class="options-grid" id="options-grid"></div>
                <div id="feedback-area"></div>
                <button id="next-btn" onclick="goToNext()">Next Question &rarr;</button>
            </div>
        </div>

        <div id="results-screen">
            <div class="score-circle">
                <div class="score-num" id="final-score">0</div>
                <div style="font-size: 0.4em;">/ 15</div>
            </div>
            <div id="feedback-title" style="font-size: 1.5em; font-weight: 800; margin-bottom: 10px;"></div>
            <div id="feedback-msg" style="margin-bottom: 30px; color: #64748b;"></div>
            <button class="restart-btn" onclick="resetQuiz()">Restart Practice</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Kari finished the quiz (most quick, _______) of all.", options: ["most quick", "most quickly"], a: 1, exp: "Use 'most quickly' because it is an adverb modifying the action verb 'finished'." },
            { q: "The baby ducklings (ready, _______) took to the water.", options: ["ready", "readily"], a: 1, exp: "'Readily' is an adverb modifying the action verb 'took'." },
            { q: "The nurse noticed she didn't look very (good, _______).", options: ["good", "well"], a: 1, exp: "When describing a person's health after a linking verb, 'well' is the correct adjective form." },
            { q: "Tina wanted very (bad, _______) to make the team.", options: ["bad", "badly"], a: 1, exp: "'Badly' is an adverb modifying the verb 'wanted'." },
            { q: "Pete was (most, _______) finished with lunch when I arrived.", options: ["most", "almost"], a: 1, exp: "Use 'almost' (meaning 'nearly') as an adverb modifying 'finished'." },
            { q: "The plan is (_______, possibly) to carry out.", options: ["possible", "possibly"], a: 0, exp: "'Possible' is a predicate adjective following the linking verb 'is'." },
            { q: "I (sure, _______) will not go there with you!", options: ["sure", "surely"], a: 1, exp: "'Surely' is an adverb used to emphasize the statement." },
            { q: "The twelfth of November last year was (real, _______) chilly.", options: ["real", "really"], a: 1, exp: "Use the adverb 'really' to modify the adjective 'chilly'." },
            { q: "Luis tried to look at his chances (realistic, _______).", options: ["realistic", "realistically"], a: 1, exp: "'Realistically' is an adverb describing HOW he looked at his chances." },
            { q: "Teachers in our school must work _______.", options: ["hard", "hardly"], a: 0, exp: "'Hard' is the correct adverb form to describe intense effort." },
            { q: "The team played _______ today.", options: ["good", "well"], a: 1, exp: "Use 'well' as an adverb to describe how the team 'played'." },
            { q: "The movie we saw was actually quite _______.", options: ["bad", "badly"], a: 0, exp: "'Bad' is an adjective following the linking verb 'was'." },
            { q: "_______ students are careful with their work.", options: ["Most", "Almost"], a: 0, exp: "Use 'Most' as an adjective to modify the noun 'students'." },
            { q: "The seats in the theater recline _______.", options: ["good", "well"], a: 1, exp: "'Well' is an adverb modifying the action verb 'recline'." },
            { q: "A skater needs _______ feet to be successful.", options: ["sure", "surely"], a: 0, exp: "Use the adjective 'sure' to describe the noun 'feet'." }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const currentQuestion = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            document.getElementById('q-count').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIndex / questions.length) * 100}%`;
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${option}</span><span class="icon"></span>`;
                btn.onclick = () => handleAnswer(index, btn);
                grid.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, clickedBtn) {
            if (answered) return;
            answered = true;

            const correctIndex = questions[currentQuestionIndex].a;
            const btns = document.querySelectorAll('.option-btn');
            const feedbackArea = document.getElementById('feedback-area');
            
            btns.forEach(btn => btn.classList.add('disabled'));

            if (selectedIndex === correctIndex) {
                score++;
                clickedBtn.classList.add('correct');
                clickedBtn.querySelector('.icon').innerHTML = '&#10003;'; 
                feedbackArea.className = 'feedback-correct';
                feedbackArea.innerHTML = `<strong>Correct!</strong> ${questions[currentQuestionIndex].exp}`;
            } else {
                clickedBtn.classList.add('wrong');
                clickedBtn.querySelector('.icon').innerHTML = '&#10007;'; 
                btns[correctIndex].classList.add('correct');
                btns[correctIndex].querySelector('.icon').innerHTML = '&#10003;';
                feedbackArea.className = 'feedback-wrong';
                feedbackArea.innerHTML = `<strong>Not quite.</strong> The correct answer is <em>${questions[currentQuestionIndex].options[correctIndex]}</em>. ${questions[currentQuestionIndex].exp}`;
            }

            feedbackArea.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function goToNext() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('results-screen').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('final-score').innerText = score;

            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-msg');

            if (score === 15) {
                title.innerText = "Grammar Legend! 🏆";
                msg.innerText = "You have mastered the difference between adjectives and adverbs!";
            } else if (score >= 12) {
                title.innerText = "Fantastic Work! 🌟";
                msg.innerText = "You have a very strong grasp of these tricky modifiers.";
            } else if (score >= 8) {
                title.innerText = "Good Job! 👍";
                msg.innerText = "You understand the basics, but review the 'good/well' and 'almost/most' rules.";
            } else {
                title.innerText = "Keep Practicing! 📚";
                msg.innerText = "Review the provided chart and try the exercise again to improve.";
            }
        }

        function resetQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById('quiz-area').style.display = 'flex';
            document.getElementById('results-screen').style.display = 'none';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
